<section id="portfolio" class="portfolio">
  <div class="container">
    <div class="row text-center mb-5">
      <h1 class="display-3 fw-bold">Featured Projects</h1>
      <div class="heading-line"></div>
      <p class="lead mt-3">
        A selection of my personal and professional work, ranging from native Android apps to API development.
      </p>
    </div>

    <div class="row g-4">
      @for (project of projects; track project.title) {
        <div class="col-lg-4 col-md-6">
          <div class="portfolio-box shadow-sm">
            <div class="portfolio-box__image-wrapper">
              <img [src]="project.image" [alt]="project.title" class="img-fluid">
            </div>
            <div class="portfolio-box__content">
              <h4>{{ project.title }}</h4>
              <p>{{ project.category }}</p>
              @if (project.link) {
                <a [href]="project.link" target="_blank" class="mt-auto text-decoration-none">
                  <button type="button" class="btn-rounded-portfolio">
                    <i class="fab fa-github me-2"></i> View Project
                  </button>
                </a>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
